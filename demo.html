<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popsy.js Demo</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #f9f9f9;
    }
    h1 { min-height: 40px; color: #333; }
    .box {
      width: 130px; height: 130px;
      background: coral; border-radius: 12px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 36px; font-weight: bold;
      color: white; margin: 20px 0;
    }
    button {
      margin: 6px; padding: 10px 22px;
      font-size: 15px; cursor: pointer;
      border: none; border-radius: 8px;
      background: #333; color: #fff;
    }
    button:hover { background: #555; }
  </style>
</head>
<body>

  <h1 id="title">Popsy.js</h1>
  <div class="box" id="box">0</div>

  <br>

  <button onclick="Popsy.counter('#box', 999, { duration: 2000 })">
    Counter
  </button>

  <button onclick="Popsy.fadeIn('#box', { duration: 800 })">
    Fade In
  </button>

  <button onclick="Popsy.typewriter('#title', 'Hello from Popsy.js!', { speed: 70 })">
    Typewriter
  </button>

  <button onclick="Popsy.shake('#box')">
    Shake
  </button>

  <button onclick="Popsy.confetti()">
    🎉 Confetti
  </button>

  <button onclick="Popsy.toast('Popsy works! 🎉')">
    Toast
  </button>

  <button onclick="Popsy.toast('Something went wrong', { type: 'error' })">
    Toast Error
  </button>

  <script src="popsy.js"></script>

</body>
</html>
